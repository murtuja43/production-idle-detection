project:
  name: production-idle-detection

video:
  output_dir: data/processed
  output_fps: null
  codec: mp4v
  resize:
    enabled: false
    width: 1280
    height: 720

logging:
  level: INFO
  csv_dir: outputs
  csv_filename: idle_detection_log.csv
  report_csv_filename: idle_report.csv
  report_json_filename: idle_report.json
  report_chart: true
  report_chart_filename: idle_report.png

optical_flow:
  pyr_scale: 0.5
  levels: 3
  winsize: 15
  iterations: 3
  poly_n: 5
  poly_sigma: 1.2
  flags: 0

visualization:
  enabled: true
  font_scale: 0.55
  line_thickness: 2

# Detection mode: optical_flow (Phase 1), ml (Isolation Forest), or combined.
detection:
  mode: optical_flow

# Sliding-window motion features shared by training and ML inference.
features:
  window_size: 30   # frames per feature window
  step: 15          # window stride used when generating the training dataset
  features:
    - mean
    - std
    - max
    - min
    - active_ratio
    - mean_delta

# ML inference settings. The model is the source of truth for the feature
# definition at inference time (loaded from the metadata file below).
ml:
  model_path: data/models/isolation_forest.joblib
  metadata_path: data/models/isolation_forest.metadata.json
  combine:
    # 'and' -> idle only when optical flow AND ML agree (high precision).
    # 'or'  -> idle when either signal fires (high recall).
    strategy: and

# Isolation Forest training configuration (window_size/step/features come from
# the 'features' section so training and inference always stay consistent).
training:
  contamination: auto
  random_state: 42
  n_estimators: 100
  max_samples: auto
  feature_csv: data/processed/features.csv
  model_output: data/models/isolation_forest.joblib
  metadata_output: data/models/isolation_forest.metadata.json

zones:
  CMUS:
    enabled: true
    roi:
      x: 60
      y: 80
      width: 260
      height: 220
    motion_threshold: 1.15
    idle_duration_seconds: 8.0
    sensitivity: 0.65
    mask_path: null
    spark_filter:
      enabled: true
      brightness_threshold: 230
      min_component_area: 4
      dilate_iterations: 1
      kernel_size: 3
      # Optional: also require low saturation (0-255) so only white/blue-white
      # welding glare is suppressed, not genuinely coloured moving parts.
      # saturation_threshold: 60

  COP:
    enabled: true
    roi:
      x: 360
      y: 80
      width: 260
      height: 220
    motion_threshold: 0.85
    idle_duration_seconds: 6.0
    sensitivity: 1.0

  COK:
    enabled: true
    roi:
      x: 660
      y: 80
      width: 260
      height: 220
    motion_threshold: 0.9
    idle_duration_seconds: 6.0
    sensitivity: 1.0

  CSK:
    enabled: true
    roi:
      x: 60
      y: 340
      width: 260
      height: 220
    motion_threshold: 0.8
    idle_duration_seconds: 7.0
    sensitivity: 0.95

  CSLT:
    enabled: true
    roi:
      x: 360
      y: 340
      width: 260
      height: 220
    motion_threshold: 0.75
    idle_duration_seconds: 7.0
    sensitivity: 0.95

